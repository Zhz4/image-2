services:
  backend:
    image: zhza4/image-2-backend:latest
    container_name: image-2-backend
    env_file:
      - ./.env.prod
    environment:
      PORT: 3002
      NODE_ENV: production
    expose:
      - "3002"
    restart: unless-stopped

  frontend:
    image: zhza4/image-2-frontend:latest
    container_name: image-2-frontend
    ports:
      - "${APP_PORT:-8123}:80"
    depends_on:
      - backend
    restart: unless-stopped
